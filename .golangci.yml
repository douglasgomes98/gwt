version: "2"

run:
  timeout: 2m
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - errorlint
    - gocognit
    - gocyclo
    - gosec
    - misspell
    - nolintlint
    - revive
    - unconvert
    - unparam
  settings:
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 30
    revive:
      rules:
        - name: exported
          disabled: true
